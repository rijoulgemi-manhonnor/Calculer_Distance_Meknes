name: Calcul Automatique
on: [workflow_dispatch]

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Mis à jour en v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Mis à jour en v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python main.py
        env:
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}

      - name: Upload Result
        uses: actions/upload-artifact@v4 # Correction ici : v4 au lieu de v3
        with:
          name: Resultat-Distances
          path: output/
